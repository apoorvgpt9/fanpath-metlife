name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: lint + test + verify-docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff + function-length)
        run: make lint

      - name: Test (pytest + coverage)
        run: make test

      - name: Verify docs (DECISIONS.md <-> code)
        run: make verify-docs

      - name: Audit dependencies (pip-audit)
        run: make audit
